    <!-- ═══════════════════════════════ CRITICAL PERFORMANCE CSS ═══════════════════════════════ -->
    <style>
      :root {
        --bg: #0b0d12;
        --text: #f8fafc;
        --primary: #6366f1;
        --accent: #8b5cf6;
      }
      body {
        background-color: var(--bg);
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        overflow-y: auto;
        font-family: 'Outfit', sans-serif;
      }
      #root:empty {
        display: flex;
        height: 100vh;
        width: 100vw;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 1.5rem;
      }
      .lcp-skeleton-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        animation: pulse 2s infinite ease-in-out;
      }
      .lcp-skeleton-timer {
        font-size: 8rem;
        font-weight: 900;
        color: var(--text);
        letter-spacing: -0.05em;
        opacity: 0.1;
      }
      .lcp-skeleton-bar {
        width: 200px;
        height: 4px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 99px;
        overflow: hidden;
        position: relative;
      }
      .lcp-skeleton-bar::after {
        content: '';
        position: absolute;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, var(--primary), transparent);
        animation: loading 1.5s infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.02); opacity: 1; }
      }
      @keyframes loading {
        0% { left: -100%; }
        100% { left: 100%; }
      }
    </style>
